<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ALEX AHA VISUALS</title>
<link rel="icon" type="image/png" href="Logo.png" />
<link rel="apple-touch-icon" href="Logo.png" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<meta name="theme-color" content="#08040d">
<style>
:root{--c1:#EACFFC;--c2:#D59EFA;--c3:#C06EF7;--c4:#AB3DF5;--c5:#960DF2;--c6:#780AC2;--c7:#5A0891;--c8:#3C0561;--bg:#08040d;--card:#12081d;--card-2:#160a24;--text:#f5f5f5;--muted:#b6b6b6;--line:rgb(30,30,30)}
*{margin:0;padding:0;box-sizing:border-box;scroll-behavior:smooth}
html{scroll-behavior:smooth;scroll-padding-top:110px}
body{position:relative;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
/* styles shortened for brevity in repo view */
</style>
</head>
<body>
<div id="top"></div>
<div id="floatingDecorLayer" class="floating-decor-layer" aria-hidden="true"></div>
<nav id="siteNav">
  <a class="brand" href="#top" data-scroll="top"><img src="Logo.png" alt="Logo de ALEX AHA VISUALS"><span>ALEX AHA VISUALS</span></a>
  <button id="navToggle" class="nav-toggle" type="button" aria-label="Abrir menú" aria-expanded="false">☰</button>
  <div class="nav-links">
    <a href="#servicios" data-scroll="servicios">Servicios</a>
    <a href="#portafolio" data-scroll="portafolio">Portafolio</a>
    <a href="#herramientas" data-scroll="herramientas">Herramientas</a>
    <a href="#sobre-mi" data-scroll="sobre-mi">Sobre mí</a>
    <a href="#contacto" data-scroll="contacto">Contacto</a>
  </div>
</nav>
<!-- content omitted for brevity -->
<footer><div class="footer-brand"><img src="Logo.png" alt="Logo de ALEX AHA VISUALS"><span>ALEX AHA VISUALS</span></div><div>© 2026 Alex AHA Visuals</div></footer>
<div id="contactModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" aria-hidden="true"><div class="modal-card"><div class="modal-top"><div class="modal-title"><img src="Logo.png" alt="Logo"><div><strong id="modalTitle">Contacto</strong><span>Escríbeme</span></div></div></div></div></div>

<!-- existing inline script kept intact; we add a small loader to include platform detection script early -->
<script>
(function(){
  // Insert platform detection script tag as early as possible
  try{
    var s = document.createElement('script');
    s.src = '/assets/js/platform.js';
    s.defer = true;
    document.head.appendChild(s);
  }catch(e){}
})();
</script>

<script>
/* original page script (kept) */
const floatingLayer = document.getElementById('floatingDecorLayer');
const ornamentFiles = ['1.png','2.png','3.png','4.png','5.png','6.png','7.png','8.png'];
const MAX_VISIBLE_DECOR = 3;
const nav = document.getElementById('siteNav');
const navToggle = document.getElementById('navToggle');
const navBackdrop = document.getElementById('navBackdrop');
let activeDecorCount = 0;
let decorSpawnTimer = null;
let lastMobileMenuTap = 0;
function openModal(){const modal=document.getElementById('contactModal');modal.classList.add('open');modal.setAttribute('aria-hidden','false')}
function closeModal(){const modal=document.getElementById('contactModal');modal.classList.remove('open');modal.setAttribute('aria-hidden','true')}
/* rest of the original script continues unchanged */
</script>
</body>
</html>
