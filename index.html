<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ALEX AHA VISUALS</title>
<link rel="icon" type="image/png" href="Logo.png" />
<link rel="apple-touch-icon" href="Logo.png" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<script>(()=>{const ua=navigator.userAgent||'';const isAndroid=/Android/i.test(ua);document.documentElement.classList.add(isAndroid?'device-android':'device-desktop');})();</script>
<style>
:root{--c1:#EACFFC;--c2:#D59EFA;--c3:#C06EF7;--c4:#AB3DF5;--c5:#960DF2;--c6:#780AC2;--c7:#5A0891;--c8:#3C0561;--bg:#08040d;--card:#12081d;--card-2:#160a24;--text:#f5f5f5;--muted:#b6b6b6;--line:rgba(255,255,255,.08)}
*{margin:0;padding:0;box-sizing:border-box;scroll-behavior:smooth}
html{scroll-behavior:smooth;scroll-padding-top:110px}
body{position:relative;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
body::before{content:"";position:fixed;inset:0;background:radial-gradient(circle at 20% 20%, rgba(150,13,242,.25), transparent 30%),radial-gradient(circle at 80% 40%, rgba(192,110,247,.15), transparent 30%),radial-gradient(circle at 50% 90%, rgba(60,5,97,.5), transparent 40%);pointer-events:none;z-index:-1}
img,video{max-width:100%;display:block}a,button{-webkit-tap-highlight-color:transparent}section,footer{position:relative;z-index:3}
.floating-decor-layer{position:fixed;inset:0;pointer-events:none;z-index:1}
.floating-icon{position:fixed;width:132px;height:132px;pointer-events:auto;touch-action:none;user-select:none;cursor:grab;opacity:1;transition:opacity .9s ease, transform .9s ease, filter .25s ease;filter:drop-shadow(0 14px 32px rgba(150,13,242,.38));will-change:transform,opacity,left,top;z-index:1}
.floating-icon:active{cursor:grabbing}
.floating-icon.is-dragging{z-index:2;filter:drop-shadow(0 16px 42px rgba(234,207,252,.22))}
.floating-icon__inner{width:100%;height:100%;animation:iconFloat 8s ease-in-out infinite;transform-origin:center center}
.floating-icon__inner img{width:100%;height:100%;object-fit:contain;opacity:1;mix-blend-mode:normal}
.floating-icon.is-dragging .floating-icon__inner{animation:none}
@keyframes iconFloat{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-12px) rotate(2deg)}}
nav{position:fixed;top:0;width:100%;padding:18px 8%;display:flex;justify-content:space-between;align-items:center;gap:20px;backdrop-filter:blur(16px);background:rgba(8,4,13,.55);border-bottom:1px solid var(--line);z-index:100}
.brand{display:flex;align-items:center;gap:12px;min-width:0;cursor:pointer;text-decoration:none;color:inherit;transition:.28s ease}
.brand:hover{filter:drop-shadow(0 0 18px rgba(234,207,252,.38));text-shadow:0 0 16px rgba(234,207,252,.2)}
.brand img{width:42px;height:42px;object-fit:contain;flex:0 0 auto;filter:drop-shadow(0 10px 25px rgba(150,13,242,.25))}
.brand span{font-size:1.05rem;font-weight:800;letter-spacing:.12em;white-space:nowrap}
.nav-toggle{display:none;appearance:none;border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.03);color:white;width:46px;height:46px;border-radius:14px;cursor:pointer;align-items:center;justify-content:center;font-size:1.2rem;line-height:1;transition:.25s ease}
.nav-toggle:hover{background:rgba(255,255,255,.08)}
.nav-links{display:flex;gap:28px;flex-wrap:wrap;justify-content:flex-end}
.nav-links a{text-decoration:none;color:white;font-size:.95rem;opacity:.88;transition:.25s}
.nav-links a:hover{opacity:1;color:var(--c2)}
.hero{min-height:100vh;display:grid;grid-template-columns:1.15fr .85fr;align-items:center;gap:60px;padding:120px 8% 60px}
.hero-content{max-width:850px}
.tag{display:inline-flex;align-items:center;gap:10px;padding:10px 16px;border:1px solid var(--line);border-radius:999px;margin-bottom:25px;color:var(--c2);background:rgba(255,255,255,.02)}
.tag::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--c4);box-shadow:0 0 0 4px rgba(171,61,245,.14)}
.hero h1{font-size:clamp(3rem,8vw,7rem);line-height:.92;margin-bottom:22px;letter-spacing:-.04em}
.gradient{background:linear-gradient(90deg,var(--c1),var(--c4));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{font-size:1.12rem;line-height:1.85;max-width:720px;color:var(--muted);margin-bottom:36px}
.buttons{display:flex;gap:16px;flex-wrap:wrap}
.btn{appearance:none;border:0;padding:16px 28px;border-radius:14px;font-weight:700;text-decoration:none;transition:.3s;cursor:pointer;font:inherit;display:inline-flex;align-items:center;justify-content:center;gap:10px}
.primary{background:linear-gradient(135deg,var(--c4),var(--c5));color:white;box-shadow:0 18px 40px rgba(150,13,242,.22)}
.secondary{border:1px solid var(--line);color:white;background:rgba(255,255,255,.02)}
.btn:hover{transform:translateY(-4px)}
.hero-art{position:relative;display:flex;align-items:center;justify-content:center;min-height:520px}
.hero-card{width:min(100%,420px);background:linear-gradient(180deg, rgba(18,8,29,.88), rgba(18,8,29,.56));border:1px solid rgba(255,255,255,.08);border-radius:32px;padding:28px;box-shadow:0 30px 80px rgba(0,0,0,.35);backdrop-filter:blur(10px);position:relative;overflow:hidden;transition:box-shadow .3s ease,border-color .3s ease,transform .3s ease,filter .3s ease}
.hero-card::before{content:"";position:absolute;inset:-35% -25% auto auto;width:240px;height:240px;background:radial-gradient(circle, rgba(171,61,245,.38), transparent 70%);pointer-events:none;opacity:.6;transition:opacity .3s ease}
.hero-card::after{content:"";position:absolute;inset:0;border-radius:inherit;border:1px solid rgba(234,207,252,.12);opacity:.25;transition:opacity .3s ease;pointer-events:none}
.hero-card:hover{border-color:rgba(234,207,252,.28);box-shadow:0 28px 90px rgba(0,0,0,.48),0 0 54px rgba(171,61,245,.22),0 0 24px rgba(234,207,252,.16);filter:saturate(1.05);transform:translateY(-2px)}
.hero-card:hover::before{opacity:1}.hero-card:hover::after{opacity:1}
.hero-logo{display:flex;align-items:center;gap:16px;margin-bottom:24px}
.hero-logo img{width:74px;height:74px;object-fit:contain;flex:0 0 auto;filter:drop-shadow(0 12px 25px rgba(150,13,242,.3))}
.hero-logo strong{display:block;font-size:1.15rem;letter-spacing:.08em}
.hero-logo span{display:block;color:var(--muted);margin-top:4px;font-size:.95rem}
.preview{display:grid;gap:14px;margin-top:10px}
.preview-row{padding:14px 16px;border-radius:18px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);color:var(--muted);line-height:1.55}
section{padding:108px 8%}
.section-title{font-size:clamp(2rem,4vw,3.2rem);margin-bottom:18px;letter-spacing:-.03em}
.section-sub{color:var(--muted);margin-bottom:54px;max-width:760px;line-height:1.8}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:22px}
.card{background:linear-gradient(180deg,var(--card),var(--card-2));padding:28px;border-radius:24px;border:1px solid rgba(255,255,255,.06);transition:.3s;position:relative;overflow:hidden}
.card::after{content:"";position:absolute;inset:auto -20% -40% auto;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle, rgba(171,61,245,.16), transparent 70%);pointer-events:none}
.card:hover{transform:translateY(-8px);border-color:rgba(192,110,247,.42)}
.card-icon{width:54px;height:54px;border-radius:18px;display:grid;place-items:center;margin-bottom:18px;background:linear-gradient(135deg, rgba(150,13,242,.18), rgba(234,207,252,.08));border:1px solid rgba(255,255,255,.08);overflow:hidden;box-shadow:inset 0 1px 0 rgba(255,255,255,.08)}
.card-icon svg{width:30px;height:30px;fill:none;stroke:var(--c1);stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.card h3{margin-bottom:12px;font-size:1.22rem}
.card p{color:var(--muted);line-height:1.75}
.portfolio{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:22px}
.project{min-height:280px;border-radius:24px;overflow:hidden;position:relative;background:linear-gradient(135deg,var(--c8),var(--c5));border:1px solid rgba(255,255,255,.06);isolation:isolate;transform:translateY(0);transition:transform .3s ease,box-shadow .3s ease}
.project__glow{position:absolute;inset:0;border-radius:inherit;background:radial-gradient(circle at 20% 25%, rgba(234,207,252,.10), transparent 30%),radial-gradient(circle at 78% 70%, rgba(171,61,245,.08), transparent 28%);filter:blur(14px);opacity:.18;pointer-events:none;z-index:0}
.project::before{content:"";position:absolute;inset:0;padding:2px;border-radius:inherit;background:linear-gradient(90deg, rgba(234,207,252,0) 0%, rgba(234,207,252,.58) 25%, rgba(171,61,245,.58) 50%, rgba(96,13,242,.58) 75%, rgba(234,207,252,0) 100%);background-size:300% 300%;opacity:0;transition:opacity .35s ease;animation:borderLight 7s linear infinite;pointer-events:none;z-index:5;-webkit-mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude}
.project::after{content:"";position:absolute;inset:0;border-radius:inherit;background:radial-gradient(circle at 50% 50%, rgba(234,207,252,.08), transparent 52%);opacity:0;transition:opacity .35s ease;pointer-events:none;z-index:4}
.project:hover{transform:translateY(-8px);box-shadow:0 0 0 1px rgba(234,207,252,.12),0 16px 45px rgba(150,13,242,.18),0 0 36px rgba(171,61,245,.18)}
.project:hover::before,.project:hover::after{opacity:1}
.project__media{position:absolute;inset:0;z-index:1}
.project__media img,.project__media video{width:100%;height:100%;object-fit:cover;display:block;filter:saturate(1.02) contrast(1.03)}
.project__shade{position:absolute;inset:0;z-index:2;background:linear-gradient(180deg, rgba(8,4,13,.05) 0%, rgba(8,4,13,.16) 42%, rgba(8,4,13,.86) 100%)}
.project__label{position:absolute;left:16px;right:16px;bottom:16px;z-index:3;display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;padding:14px 15px 13px;border-radius:18px;background:linear-gradient(180deg, rgba(86,22,128,.18) 0%, rgba(8,4,13,.80) 78%);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.08)}
.project__label strong{font-size:1.18rem;line-height:1.2;text-align:center;text-shadow:0 2px 10px rgba(0,0,0,.20)}
@keyframes borderLight{0%{background-position:0% 50%}100%{background-position:300% 50%}}
.about{display:grid;grid-template-columns:1.05fr .95fr;gap:28px;align-items:stretch}
.about-box{background:var(--card);padding:36px;border-radius:24px;border:1px solid rgba(255,255,255,.06)}
.about-box p{line-height:1.9;color:var(--muted)}
.about-brand{margin-top:28px;display:flex;align-items:center;gap:14px;padding:16px 18px;border-radius:20px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06)}
.about-brand img{width:58px;height:58px;object-fit:contain}
.about-brand strong{display:block;font-size:1rem;letter-spacing:.08em}
.about-brand span{display:block;color:var(--muted);margin-top:4px;font-size:.92rem;line-height:1.4}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
.stat{background:linear-gradient(180deg,var(--card),var(--card-2));padding:28px 22px;border-radius:20px;text-align:center;border:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:160px}
.stat h2{font-size:2rem;color:var(--c2);margin-bottom:8px}
